<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ClipDock Saves</title>
  <style>
    :root{
      color-scheme:dark;
      --bg:#080b0f;--panel:#10151c;--panel2:#141a23;--line:#283240;--line2:#384555;
      --text:#f4f7fb;--muted:#91a0b3;--soft:#c5cedb;--acid:#c9ff3d;--blue:#66d9ef;--pink:#ff6fae;--warn:#ffcf5a;--bad:#ff7777;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden}
    button,input,textarea,select{font:inherit}
    button{border:1px solid var(--line);background:#151b24;color:var(--text);border-radius:8px;min-height:38px;padding:0 12px;font-weight:850;cursor:pointer}
    button:hover{border-color:var(--line2);background:#1a222d}
    button.primary{background:var(--acid);border-color:#dbff77;color:#12170d}
    button.ghost{background:transparent}
    button.icon{width:38px;padding:0;display:grid;place-items:center}
    button.danger{color:#ffb6b6;border-color:#55333a;background:#20161a}
    input,textarea,select{width:100%;border:1px solid var(--line);background:#0c1118;color:var(--text);border-radius:8px;padding:10px 11px;outline:none}
    textarea{resize:vertical;min-height:76px}
    input:focus,textarea:focus,select:focus{border-color:color-mix(in srgb,var(--acid) 56%,var(--line2));box-shadow:0 0 0 2px color-mix(in srgb,var(--acid) 14%,transparent)}
    a{color:inherit}
    .app{display:grid;grid-template-columns:360px 1fr;height:100vh;min-height:0}
    aside{border-right:1px solid var(--line);background:#0b1016;display:grid;grid-template-rows:auto 1fr auto;min-height:0}
    .brand{display:flex;align-items:center;gap:12px;padding:16px;border-bottom:1px solid var(--line)}
    .mark{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;background:linear-gradient(135deg,var(--acid),#67d7ff);color:#10140f;font-weight:950}
    .brand h1{margin:0;font-size:18px;line-height:1}.brand p{margin:3px 0 0;color:var(--muted);font-size:12px;font-weight:700}
    .form{padding:14px;display:grid;gap:10px;overflow:auto;min-height:0}
    .row{display:grid;grid-template-columns:1fr auto;gap:8px}.two{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    label{display:grid;gap:6px;color:var(--muted);font-size:11px;font-weight:850;text-transform:uppercase;letter-spacing:.06em}
    .preview{border:1px solid var(--line);border-radius:8px;background:var(--panel);overflow:hidden}
    .preview-img{height:138px;background:#0a0e14;display:grid;place-items:center;color:var(--muted);font-size:12px;font-weight:850}
    .preview-img img{width:100%;height:100%;object-fit:cover;display:block}
    .preview-body{padding:11px;display:grid;gap:7px}.preview-body strong{font-size:14px}.preview-body p{margin:0;color:var(--muted);font-size:12px;line-height:1.35}
    .chips{display:flex;gap:6px;flex-wrap:wrap}.chip{border:1px solid var(--line);border-radius:999px;padding:4px 7px;color:var(--soft);font-size:10px;font-weight:850;background:#101720}
    .chip.platform{color:var(--acid);border-color:color-mix(in srgb,var(--acid) 36%,var(--line))}
    .side-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:14px;border-top:1px solid var(--line)}
    main{display:grid;grid-template-rows:auto 1fr;min-width:0;min-height:0}
    .topbar{border-bottom:1px solid var(--line);padding:14px 16px;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;background:#0a0e14}
    .searchbar{display:grid;grid-template-columns:1fr 150px 140px 130px;gap:8px}
    .stats{display:flex;gap:8px;align-items:center;color:var(--muted);font-size:12px;font-weight:800;white-space:nowrap}
    .library{min-height:0;overflow:auto;padding:16px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(245px,1fr));gap:12px;align-items:start}
    .card{position:relative;overflow:hidden;border:1px solid var(--line);border-radius:8px;background:var(--panel);display:grid;grid-template-rows:auto 1fr;min-height:305px}
    .card:hover{border-color:var(--line2);background:#121922}
    .thumb{height:146px;background:#090d13;display:grid;place-items:center;color:var(--muted);font-size:12px;font-weight:850}
    .thumb img{width:100%;height:100%;object-fit:cover;display:block}
    .card-body{padding:12px;display:grid;gap:9px}
    .meta{display:flex;align-items:center;justify-content:space-between;gap:8px}
    .platform-pill{font-size:10px;font-weight:950;color:var(--acid);border:1px solid color-mix(in srgb,var(--acid) 38%,var(--line));border-radius:999px;padding:4px 8px;background:#111a16}
    .status{font-size:10px;font-weight:900;color:#d7deea;border:1px solid var(--line);border-radius:999px;padding:4px 8px;background:#121923}
    .card h2{margin:0;font-size:16px;line-height:1.18}
    .card p{margin:0;color:var(--muted);font-size:12px;line-height:1.42;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
    .note{border-left:2px solid var(--acid);padding-left:8px;color:#dce6f5!important}
    .card-actions{display:flex;gap:7px;align-items:center;margin-top:2px}.card-actions button{min-height:34px;font-size:12px}.card-actions .primary{flex:1}
    .empty{min-height:52vh;border:1px dashed var(--line2);border-radius:8px;display:grid;place-items:center;text-align:center;color:var(--muted);padding:24px}
    .empty strong{display:block;color:var(--text);font-size:18px;margin-bottom:6px}
    dialog{border:1px solid var(--line2);border-radius:10px;background:#0d1219;color:var(--text);width:min(760px,92vw);padding:0;box-shadow:0 28px 80px #000a}
    dialog::backdrop{background:rgba(0,0,0,.62)}
    .modal-head{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);padding:14px 16px}.modal-head h2{margin:0;font-size:18px}
    .modal-body{padding:16px;display:grid;gap:10px}.modal-actions{display:flex;justify-content:flex-end;gap:8px;padding:14px 16px;border-top:1px solid var(--line)}
    .toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:#111821;border:1px solid var(--line2);border-radius:999px;padding:10px 14px;color:#f3f7fb;font-weight:850;font-size:12px;box-shadow:0 12px 35px #0009;z-index:10}
    .hidden{display:none!important}
    @media(max-width:920px){body{overflow:auto}.app{height:auto;min-height:100vh;grid-template-columns:1fr}aside{border-right:0;border-bottom:1px solid var(--line)}.searchbar{grid-template-columns:1fr 1fr}.library{overflow:visible}.topbar{grid-template-columns:1fr}.stats{white-space:normal}}
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <header class="brand"><div class="mark">S</div><div><h1>ClipDock Saves</h1><p>Referencias, posts, tutoriales y links.</p></div></header>
      <section class="form">
        <label>Link
          <div class="row"><input id="url" placeholder="Pega YouTube, Facebook, Pinterest, web..."><button id="read" class="primary">Leer</button></div>
        </label>
        <div class="preview" id="preview">
          <div class="preview-img" id="preview-img">Vista previa</div>
          <div class="preview-body"><strong id="preview-title">Esperando un link</strong><p id="preview-desc">Cuando una red bloquee metadata, llena los campos manualmente.</p><div class="chips" id="preview-chips"></div></div>
        </div>
        <label>Titulo<input id="title" placeholder="Titulo de la referencia"></label>
        <label>Descripcion<textarea id="description" placeholder="Descripcion, copy del post o resumen"></textarea></label>
        <div class="two">
          <label>Coleccion<input id="collection" list="collections" placeholder="Cliente, proyecto, ideas..."></label>
          <label>Tipo<select id="type"><option>Post</option><option>Video</option><option>Tutorial</option><option>Articulo</option><option>Imagen</option><option>Inspiracion</option><option>Otro</option></select></label>
        </div>
        <div class="two">
          <label>Estado<select id="status"><option>Nuevo</option><option>Revisado</option><option>Usado</option><option>Favorito</option><option>Archivado</option></select></label>
          <label>Momento<input id="moment" placeholder="0:12, escena 2, slide 4"></label>
        </div>
        <label>Tags<input id="tags" placeholder="captions, color, anuncio, premiere"></label>
        <label>Notas del editor<textarea id="notes" placeholder="Que quieres recordar de esta referencia?"></textarea></label>
        <label>Imagen manual<input id="image-url" placeholder="URL de imagen si la preview falla"></label>
        <label>Subir imagen<input id="image-file" type="file" accept="image/*"></label>
        <datalist id="collections"></datalist>
      </section>
      <footer class="side-actions"><button id="reset">Limpiar</button><button id="save" class="primary">Guardar</button></footer>
    </aside>
    <main>
      <div class="topbar">
        <div class="searchbar">
          <input id="search" placeholder="Buscar por titulo, notas, tags o plataforma">
          <select id="platform-filter"><option value="">Plataforma</option></select>
          <select id="type-filter"><option value="">Tipo</option></select>
          <select id="status-filter"><option value="">Estado</option></select>
        </div>
        <div class="stats"><span id="count">0 guardados</span><button id="export-html">Exportar HTML</button><button id="export-json">JSON</button><button id="import-json">Importar</button><input id="import-file" type="file" accept="application/json" class="hidden"></div>
      </div>
      <section class="library"><div class="grid" id="grid"></div><div class="empty hidden" id="empty"><div><strong>Tu biblioteca esta lista.</strong><span>Pega un link para guardar una referencia visual.</span></div></div></section>
    </main>
  </div>
  <dialog id="edit-dialog">
    <div class="modal-head"><h2>Editar save</h2><button class="icon" id="close-edit">x</button></div>
    <div class="modal-body" id="edit-body"></div>
    <div class="modal-actions"><button id="delete-edit" class="danger">Eliminar</button><button id="save-edit" class="primary">Guardar cambios</button></div>
  </dialog>
  <script>
    const STORAGE_KEY = 'clipdock-saves.v1';
    const $ = selector => document.querySelector(selector);
    const escapeHtml = value => String(value || '').replace(/[&<>"']/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));
    const fields = ['url','title','description','collection','type','status','moment','tags','notes','image-url'];
    let saves = readSaves();
    let draftPreview = null;
    let editId = '';
    let manualImageData = '';

    function readSaves(){ try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch (_) { return []; } }
    function persist(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(saves)); render(); }
    function normalizeUrl(value){ try { const u = new URL(String(value || '').trim()); if (!/^https?:$/.test(u.protocol)) return ''; return u.toString(); } catch (_) { return ''; } }
    function detectPlatform(raw){
      try {
        const host = new URL(raw).hostname.replace(/^www\./,'').toLowerCase();
        const table = [['youtube.com','YouTube'],['youtu.be','YouTube'],['vimeo.com','Vimeo'],['tiktok.com','TikTok'],['instagram.com','Instagram'],['facebook.com','Facebook'],['fb.watch','Facebook'],['pinterest.','Pinterest'],['pin.it','Pinterest'],['x.com','X'],['twitter.com','X'],['behance.net','Behance'],['dribbble.com','Dribbble'],['reddit.com','Reddit'],['linkedin.com','LinkedIn'],['threads.net','Threads'],['soundcloud.com','SoundCloud'],['spotify.com','Spotify'],['medium.com','Medium'],['notion.site','Notion'],['figma.com','Figma'],['canva.com','Canva']];
        const found = table.find(([key]) => host.includes(key));
        return found ? found[1] : host.split('.')[0].replace(/^\w/, c => c.toUpperCase());
      } catch (_) { return 'Web'; }
    }
    function inferType(platform, url, title){
      const text = `${platform} ${url} ${title}`.toLowerCase();
      if (/youtube|vimeo|tiktok|reel|video|watch/.test(text)) return 'Video';
      if (/tutorial|how to|como|curso/.test(text)) return 'Tutorial';
      if (/pinterest|behance|dribbble|image|jpg|png|webp/.test(text)) return 'Imagen';
      if (/blog|medium|article|articulo/.test(text)) return 'Articulo';
      return 'Post';
    }
    function tagsFromText(text){
      const words = String(text || '').toLowerCase().match(/[a-z0-9#]{4,}/g) || [];
      return [...new Set(words.filter(w => !['https','http','www','com','para','with','this','that','from'].includes(w)).slice(0, 6))];
    }
    function toast(message){
      document.querySelector('.toast')?.remove();
      const el = document.createElement('div'); el.className = 'toast'; el.textContent = message; document.body.appendChild(el);
      setTimeout(() => el.remove(), 2600);
    }
    function requestParent(action, payload = {}, timeout = 14000){
      return new Promise((resolve, reject) => {
        const requestId = crypto.randomUUID();
        const timer = setTimeout(() => { window.removeEventListener('message', onMessage); reject(new Error('Servidor ocupado o sin respuesta.')); }, timeout);
        function onMessage(event){
          const data = event.data || {};
          if (data.clipdock !== 'clipdock-saves-result' || data.requestId !== requestId) return;
          clearTimeout(timer); window.removeEventListener('message', onMessage);
          data.ok ? resolve(data.result) : reject(new Error(data.error || 'No pude completar la accion.'));
        }
        window.addEventListener('message', onMessage);
        window.parent.postMessage({ clipdock:'clipdock-saves', requestId, action, payload }, '*');
      });
    }
    async function readPreview(){
      const raw = $('#url').value.trim();
      const url = normalizeUrl(raw);
      if (!url) return toast('Pega un link valido.');
      $('#read').disabled = true; $('#read').textContent = 'Leyendo...';
      try {
        let preview = await requestParent('preview-url', { url });
        preview = preview || {};
        preview.url = preview.url || url;
        preview.platform = preview.platform || detectPlatform(url);
        preview.type = preview.type || inferType(preview.platform, url, preview.title);
        preview.tags = Array.isArray(preview.tags) && preview.tags.length ? preview.tags : tagsFromText(`${preview.title} ${preview.description}`);
        draftPreview = preview;
        fillFormFromPreview(preview);
        renderPreview(preview);
        toast(preview.complete === false ? 'Guardado con datos parciales. Puedes completar manualmente.' : 'Preview lista.');
      } catch (error) {
        const platform = detectPlatform(url);
        const fallback = { url, platform, type: inferType(platform, url, ''), title: '', description: '', tags: [], complete:false, note:error.message };
        draftPreview = fallback;
        fillFormFromPreview(fallback, false);
        renderPreview(fallback);
        toast('La red bloqueo datos. Completa la tarjeta manualmente.');
      } finally {
        $('#read').disabled = false; $('#read').textContent = 'Leer';
      }
    }
    function fillFormFromPreview(preview, overwrite = true){
      if (overwrite || !$('#title').value) $('#title').value = preview.title || '';
      if (overwrite || !$('#description').value) $('#description').value = preview.description || '';
      if (overwrite || !$('#type').value) $('#type').value = preview.type || 'Post';
      if (!$('#collection').value) $('#collection').value = preview.platform || '';
      if (!$('#tags').value) $('#tags').value = (preview.tags || []).join(', ');
      if (!$('#image-url').value && preview.image) $('#image-url').value = preview.image;
    }
    function renderPreview(preview = draftPreview){
      const img = preview?.thumbnailDataUrl || manualImageData || preview?.image || $('#image-url').value.trim();
      $('#preview-img').innerHTML = img ? `<img src="${escapeHtml(img)}" alt="">` : 'Vista previa';
      $('#preview-title').textContent = preview?.title || $('#title').value || 'Sin titulo todavia';
      $('#preview-desc').textContent = preview?.description || $('#description').value || preview?.note || 'Puedes guardar aun sin metadata completa.';
      $('#preview-chips').innerHTML = [
        `<span class="chip platform">${escapeHtml(preview?.platform || detectPlatform($('#url').value) || 'Web')}</span>`,
        `<span class="chip">${escapeHtml(preview?.type || $('#type').value || 'Post')}</span>`,
        preview?.author ? `<span class="chip">${escapeHtml(preview.author)}</span>` : '',
        preview?.metricsNote ? `<span class="chip">${escapeHtml(preview.metricsNote)}</span>` : ''
      ].filter(Boolean).join('');
    }
    function formData(){
      const url = normalizeUrl($('#url').value);
      const platform = draftPreview?.platform || detectPlatform(url);
      const title = $('#title').value.trim() || draftPreview?.title || url;
      const description = $('#description').value.trim() || draftPreview?.description || '';
      const image = manualImageData || $('#image-url').value.trim() || draftPreview?.thumbnailDataUrl || draftPreview?.image || '';
      return {
        id: crypto.randomUUID(), url, platform, title, description, image,
        author: draftPreview?.author || '', type: $('#type').value || inferType(platform, url, title),
        status: $('#status').value || 'Nuevo', collection: $('#collection').value.trim() || platform,
        moment: $('#moment').value.trim(), tags: $('#tags').value.split(',').map(t => t.trim()).filter(Boolean),
        notes: $('#notes').value.trim(), savedAt: new Date().toISOString(), updatedAt: new Date().toISOString(),
        source: draftPreview?.source || 'manual', complete: draftPreview?.complete !== false,
        metricsNote: draftPreview?.metricsNote || 'Metricas dependientes de la plataforma.'
      };
    }
    function saveCurrent(){
      const item = formData();
      if (!item.url) return toast('Pega un link valido antes de guardar.');
      const existing = saves.find(save => save.url === item.url);
      if (existing && !confirm('Este link ya existe. Guardarlo otra vez?')) return;
      saves.unshift(item); persist(); clearForm(); toast('Referencia guardada.');
    }
    function clearForm(){
      fields.forEach(id => { const el = $('#' + id); if (el) el.value = ''; });
      $('#status').value = 'Nuevo'; $('#type').value = 'Post'; draftPreview = null; manualImageData = ''; renderPreview(null);
    }
    function matches(item){
      const q = $('#search').value.trim().toLowerCase();
      const p = $('#platform-filter').value; const t = $('#type-filter').value; const s = $('#status-filter').value;
      const hay = `${item.title} ${item.description} ${item.platform} ${item.collection} ${item.tags?.join(' ')} ${item.notes}`.toLowerCase();
      return (!q || hay.includes(q)) && (!p || item.platform === p) && (!t || item.type === t) && (!s || item.status === s);
    }
    function render(){
      const items = saves.filter(matches);
      $('#count').textContent = `${items.length} de ${saves.length} guardados`;
      $('#empty').classList.toggle('hidden', saves.length || items.length);
      $('#grid').innerHTML = items.map(cardTemplate).join('');
      updateFilterOptions();
    }
    function cardTemplate(item){
      const img = item.image ? `<img src="${escapeHtml(item.image)}" alt="">` : 'Sin imagen';
      const tags = (item.tags || []).slice(0, 5).map(tag => `<span class="chip">${escapeHtml(tag)}</span>`).join('');
      return `<article class="card" data-id="${escapeHtml(item.id)}">
        <div class="thumb">${img}</div>
        <div class="card-body">
          <div class="meta"><span class="platform-pill">${escapeHtml(item.platform || 'Web')}</span><span class="status">${escapeHtml(item.status || 'Nuevo')}</span></div>
          <h2>${escapeHtml(item.title)}</h2>
          <p>${escapeHtml(item.description || item.url)}</p>
          ${item.notes ? `<p class="note">${escapeHtml(item.notes)}</p>` : ''}
          <div class="chips">${tags}${item.collection ? `<span class="chip">${escapeHtml(item.collection)}</span>` : ''}${item.moment ? `<span class="chip">${escapeHtml(item.moment)}</span>` : ''}</div>
          <div class="card-actions"><button class="primary" data-open="${escapeHtml(item.id)}">Abrir</button><button data-copy="${escapeHtml(item.id)}">Copiar</button><button data-edit="${escapeHtml(item.id)}">Editar</button></div>
        </div>
      </article>`;
    }
    function unique(key){ return [...new Set(saves.map(item => item[key]).filter(Boolean))].sort((a,b) => a.localeCompare(b)); }
    function updateFilterOptions(){
      fillSelect($('#platform-filter'), 'Plataforma', unique('platform'));
      fillSelect($('#type-filter'), 'Tipo', unique('type'));
      fillSelect($('#status-filter'), 'Estado', unique('status'));
      $('#collections').innerHTML = unique('collection').map(value => `<option value="${escapeHtml(value)}"></option>`).join('');
    }
    function fillSelect(select, label, values){
      const current = select.value;
      select.innerHTML = `<option value="">${label}</option>` + values.map(value => `<option value="${escapeHtml(value)}">${escapeHtml(value)}</option>`).join('');
      select.value = values.includes(current) ? current : '';
    }
    function openExternal(url){ requestParent('open-url', { url }).catch(() => window.open(url, '_blank')); }
    function openEdit(id){
      const item = saves.find(save => save.id === id); if (!item) return;
      editId = id;
      $('#edit-body').innerHTML = `
        <label>Titulo<input id="edit-title" value="${escapeHtml(item.title)}"></label>
        <label>Descripcion<textarea id="edit-description">${escapeHtml(item.description)}</textarea></label>
        <div class="two"><label>Coleccion<input id="edit-collection" value="${escapeHtml(item.collection)}"></label><label>Estado<select id="edit-status">${['Nuevo','Revisado','Usado','Favorito','Archivado'].map(v => `<option ${item.status===v?'selected':''}>${v}</option>`).join('')}</select></label></div>
        <div class="two"><label>Tipo<input id="edit-type" value="${escapeHtml(item.type)}"></label><label>Momento<input id="edit-moment" value="${escapeHtml(item.moment)}"></label></div>
        <label>Tags<input id="edit-tags" value="${escapeHtml((item.tags || []).join(', '))}"></label>
        <label>Notas<textarea id="edit-notes">${escapeHtml(item.notes)}</textarea></label>
        <label>Imagen<input id="edit-image" value="${escapeHtml(item.image)}"></label>`;
      $('#edit-dialog').showModal();
    }
    function saveEdit(){
      const item = saves.find(save => save.id === editId); if (!item) return;
      Object.assign(item, {
        title: $('#edit-title').value.trim() || item.title,
        description: $('#edit-description').value.trim(),
        collection: $('#edit-collection').value.trim(),
        status: $('#edit-status').value,
        type: $('#edit-type').value.trim() || 'Post',
        moment: $('#edit-moment').value.trim(),
        tags: $('#edit-tags').value.split(',').map(t => t.trim()).filter(Boolean),
        notes: $('#edit-notes').value.trim(),
        image: $('#edit-image').value.trim(),
        updatedAt: new Date().toISOString()
      });
      $('#edit-dialog').close(); persist(); toast('Save actualizado.');
    }
    function exportJson(){
      downloadBlob('clipdock-saves.json', JSON.stringify({ schema:'clipdock.saves.v1', exportedAt:new Date().toISOString(), saves }, null, 2), 'application/json');
    }
    function exportHtml(){
      const cards = saves.map(item => `<article><h2>${escapeHtml(item.title)}</h2>${item.image ? `<img src="${escapeHtml(item.image)}">` : ''}<p>${escapeHtml(item.description || '')}</p><p><a href="${escapeHtml(item.url)}">${escapeHtml(item.url)}</a></p><p>${escapeHtml([item.platform,item.collection,...(item.tags||[])].filter(Boolean).join(' / '))}</p></article>`).join('');
      downloadBlob('clipdock-saves-board.html', `<!doctype html><meta charset="utf-8"><title>ClipDock Saves</title><style>body{font-family:Segoe UI,Arial;background:#101318;color:#f3f7fb;padding:24px}main{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}article{border:1px solid #303846;border-radius:10px;padding:14px;background:#171d26}img{width:100%;border-radius:8px}a{color:#c9ff3d}</style><h1>ClipDock Saves</h1><main>${cards}</main>`, 'text/html');
    }
    function downloadBlob(name, text, type){
      const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([text], { type })); a.download = name; a.click(); setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    }
    $('#read').onclick = readPreview; $('#save').onclick = saveCurrent; $('#reset').onclick = clearForm;
    $('#url').addEventListener('keydown', e => { if (e.key === 'Enter') readPreview(); });
    fields.forEach(id => $('#' + id)?.addEventListener('input', () => renderPreview()));
    ['search','platform-filter','type-filter','status-filter'].forEach(id => $('#' + id).addEventListener('input', render));
    $('#grid').addEventListener('click', event => {
      const open = event.target.closest('[data-open]'); const copy = event.target.closest('[data-copy]'); const edit = event.target.closest('[data-edit]');
      if (open) return openExternal(saves.find(s => s.id === open.dataset.open)?.url);
      if (copy) { navigator.clipboard?.writeText(saves.find(s => s.id === copy.dataset.copy)?.url || ''); return toast('Link copiado.'); }
      if (edit) return openEdit(edit.dataset.edit);
    });
    $('#image-file').addEventListener('change', event => {
      const file = event.target.files?.[0]; if (!file) return;
      const reader = new FileReader(); reader.onload = () => { manualImageData = String(reader.result || ''); renderPreview(); }; reader.readAsDataURL(file);
    });
    $('#close-edit').onclick = () => $('#edit-dialog').close();
    $('#save-edit').onclick = saveEdit;
    $('#delete-edit').onclick = () => { saves = saves.filter(save => save.id !== editId); $('#edit-dialog').close(); persist(); toast('Save eliminado.'); };
    $('#export-json').onclick = exportJson; $('#export-html').onclick = exportHtml;
    $('#import-json').onclick = () => $('#import-file').click();
    $('#import-file').addEventListener('change', event => {
      const file = event.target.files?.[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = () => { try { const data = JSON.parse(reader.result); const incoming = Array.isArray(data) ? data : data.saves; if (!Array.isArray(incoming)) throw new Error('JSON invalido'); saves = [...incoming, ...saves]; persist(); toast('Importado.'); } catch (error) { toast(error.message); } };
      reader.readAsText(file);
    });
    renderPreview(); render();
  </script>
</body>
</html>
